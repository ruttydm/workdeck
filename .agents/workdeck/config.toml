[ui]
theme = "auto"
preview = true

[paths]
data_dir = ".agents/workdeck"

[git]
base_branch = ""
recent_commits = 30

[refresh]
auto = true
interval_ms = 1500
debounce_ms = 250

[keys]
quit = "q"
refresh = "r"
search = "/"
help = "?"
changes = "c"
git = "G"
files = "f"
issues = "i"
agents = "a"
toggle_preview = "t"
group_changes = "g"
toggle_dirstat = "w"
open_editor = "o"
copy = "y"
new_issue = "n"
edit_issue = "e"
status = "s"
priority = "p"
labels = "l"
assign = "A"
jump = "space"
link_file = "L"
base = "b"
pull_requests = "p"
