name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin workdeck

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/workdeck-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/workdeck dist/workdeck-${{ matrix.target }}/
          cp README.md LICENSE dist/workdeck-${{ matrix.target }}/
          tar -C dist -czf dist/workdeck-${{ matrix.target }}.tar.gz workdeck-${{ matrix.target }}
          shasum -a 256 dist/workdeck-${{ matrix.target }}.tar.gz > dist/workdeck-${{ matrix.target }}.tar.gz.sha256

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: workdeck-${{ matrix.target }}
          path: |
            dist/workdeck-${{ matrix.target }}.tar.gz
            dist/workdeck-${{ matrix.target }}.tar.gz.sha256

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256

